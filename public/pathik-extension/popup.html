<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathik CRM Autofill</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 320px; background: #f8fafc; color: #1e293b; }
  .header { background: linear-gradient(135deg, #f97316, #ea580c); color: #fff; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
  .header-icon { width: 32px; height: 32px; background: rgba(255,255,255,.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .header h1 { font-size: 14px; font-weight: 800; }
  .header p { font-size: 11px; opacity: .8; margin-top: 1px; }
  .body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .btn { width: 100%; padding: 9px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-primary { background: linear-gradient(135deg, #f97316, #ea580c); color: #fff; }
  .btn-primary:hover { opacity: .92; }
  .btn-secondary { background: #f1f5f9; color: #475569; }
  .btn-secondary:hover { background: #e2e8f0; }
  .btn-green { background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; }
  .btn-green:hover { opacity: .92; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .guest-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; }
  .guest-card .name { font-size: 14px; font-weight: 800; color: #1e293b; }
  .guest-card .meta { font-size: 11px; color: #64748b; margin-top: 3px; }
  .guest-card .badge { display: inline-block; margin-top: 6px; padding: 2px 8px; background: #dcfce7; color: #15803d; font-size: 10px; font-weight: 700; border-radius: 20px; }
  .status { padding: 8px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
  .status-info { background: #e0f2fe; color: #0369a1; }
  .status-success { background: #dcfce7; color: #15803d; }
  .status-error { background: #fef2f2; color: #dc2626; }
  .status-warn { background: #fffbeb; color: #d97706; }
  .divider { border: none; border-top: 1px solid #f1f5f9; }
  .btn-settings { background: #f8fafc; color: #475569; border: 1.5px solid #e2e8f0; font-size: 12px; }
  .btn-settings:hover { background: #f1f5f9; border-color: #cbd5e1; }
  .footer { padding: 8px 14px; border-top: 1px solid #f1f5f9; display: flex; justify-content: center; }
  .footer a { font-size: 11px; color: #94a3b8; text-decoration: none; cursor: pointer; }
  .footer a:hover { color: #64748b; }
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">&#128203;</div>
  <div>
    <h1>Pathik CRM Autofill</h1>
    <p>Gujarat Tourist Registration</p>
  </div>
</div>
<div class="body">
  <div id="statusMsg" class="status status-info">&#8635; Loading...</div>

  <div id="guestCard" class="guest-card" style="display:none;">
    <div class="name" id="guestName">-</div>
    <div class="meta" id="guestMeta">-</div>
    <span class="badge">&#10003; Ready to autofill</span>
  </div>

  <button class="btn btn-primary" id="btnFetch">&#8635; Fetch Pending Guest</button>
  <button class="btn btn-green" id="btnAutofill" style="display:none;">&#9889; Autofill Now</button>
  <button class="btn btn-secondary" id="btnOpenPortal" style="display:none;">&#127760; Open Pathik Portal</button>

  <hr class="divider">

  <button class="btn btn-settings" id="btnSettings">&#9881; Open Settings Page &nbsp;<small style="opacity:.6;font-size:10px;">(stays open when switching tabs)</small></button>
</div>
<div class="footer">
  <a id="lnkClearData">Clear stored data</a>
</div>

<script src="popup.js"></script>
</body>
</html>
